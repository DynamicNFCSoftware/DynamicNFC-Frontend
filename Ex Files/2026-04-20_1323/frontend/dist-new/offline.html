<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DynamicNFC — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: #0f1118;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 400px; }
    .icon {
      width: 80px; height: 80px;
      margin: 0 auto 2rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    p {
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #e63946;
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #c1121f; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F4E1;</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. DynamicNFC needs an active connection to load real-time data.</p>
    <button class="btn" onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
