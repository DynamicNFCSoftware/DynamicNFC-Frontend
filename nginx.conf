events {
    worker_connections 1024;
}

http {
    # Allow large file uploads (50MB)
    client_max_body_size 50M;

    upstream frontend {
        server frontend:80;
    }

    upstream backend {
        server springboot-app:8080;
    }

    # HTTP Server - Redirect to HTTPS
    server {
        listen 80;
        server_name dynamicnfc.ca www.dynamicnfc.ca;
        
        # Allow Let's Encrypt verification
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS Server
    server {
        listen 443 ssl http2;
        server_name dynamicnfc.ca www.dynamicnfc.ca;

        # SSL Configuration
        ssl_certificate /etc/letsencrypt/live/dynamicnfc.ca/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dynamicnfc.ca/privkey.pem;
        
        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        # Frontend (React SPA)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA support: redirect 404s to index.html
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }

        # Backend API
        location /api {
            proxy_pass http://backend/api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
