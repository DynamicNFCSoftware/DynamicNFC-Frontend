name: GitHub Activity Summary

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      lookback_hours:
        description: "How many past hours to summarize"
        required: false
        default: "1"
      timezone:
        description: "Timezone for day/hour grouping (IANA format)"
        required: false
        default: "Europe/Istanbul"

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build day/hour summary
        id: summary
        shell: bash
        run: |
          set -euo pipefail

          LOOKBACK_HOURS="${{ github.event.inputs.lookback_hours }}"
          if [ -z "${LOOKBACK_HOURS}" ]; then
            LOOKBACK_HOURS="1"
          fi

          TZ_NAME="${{ github.event.inputs.timezone }}"
          if [ -z "${TZ_NAME}" ]; then
            TZ_NAME="Europe/Istanbul"
          fi

          NOW_HUMAN="$(TZ="${TZ_NAME}" date '+%Y-%m-%d %H:%M %Z')"
          TODAY="$(TZ="${TZ_NAME}" date '+%Y-%m-%d')"
          HOUR_BUCKET="$(TZ="${TZ_NAME}" date '+%H:00')"
          SINCE_EXPR="${LOOKBACK_HOURS} hour ago"

          mkdir -p .tmp
          git log \
            --since="${SINCE_EXPR}" \
            --pretty=format:'%h|%an|%ad|%s' \
            --date=format:'%Y-%m-%d %H:%M %Z' > .tmp/commits.txt

          SUMMARY_DIR="docs/github-summaries"
          SUMMARY_FILE="${SUMMARY_DIR}/${TODAY}.md"
          mkdir -p "${SUMMARY_DIR}"

          if [ ! -f "${SUMMARY_FILE}" ]; then
            {
              echo "# GitHub Activity Summary - ${TODAY}"
              echo
              echo "- Timezone: \`${TZ_NAME}\`"
              echo "- Generated by: \`github-activity-summary.yml\`"
              echo
            } > "${SUMMARY_FILE}"
          fi

          {
            echo "## ${HOUR_BUCKET} update"
            echo
            echo "_Generated at ${NOW_HUMAN}; lookback: last ${LOOKBACK_HOURS} hour(s)._"
            echo
          } >> "${SUMMARY_FILE}"

          if [ -s .tmp/commits.txt ]; then
            echo "### Commits" >> "${SUMMARY_FILE}"
            while IFS='|' read -r sha author when subject; do
              printf -- "- \`%s\` %s - %s (%s)\n" "$sha" "$subject" "$author" "$when" >> "${SUMMARY_FILE}"
            done < .tmp/commits.txt
          else
            echo "- No commits found in this interval." >> "${SUMMARY_FILE}"
          fi

          echo >> "${SUMMARY_FILE}"
          echo "---" >> "${SUMMARY_FILE}"
          echo >> "${SUMMARY_FILE}"

          {
            echo "### Activity Summary (${TODAY} ${HOUR_BUCKET})"
            echo
            if [ -s .tmp/commits.txt ]; then
              echo "Found commits in the selected interval and appended them to \`${SUMMARY_FILE}\`."
            else
              echo "No commits found in the selected interval."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Commit and push summary
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain -- docs/github-summaries)" ]; then
            echo "No summary changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/github-summaries
          git commit -m "chore(summary): update day/hour github activity log"
          git push
